spring:
  application:
    name: config-service

  

server.port: 8888

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
  client:
    register-with-eureka: true
    fetch-registry: true

---
spring:
  config:
    activate:
      on-profile: k8s

  cloud:
    discovery:
      enabled: false
    config.server.git:
      uri: https://github.com/sabanansari/lovable-config-server
      username: ${GIT_USERNAME}
      password: ${GIT_PASSWORD}
      default-label: main

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false



